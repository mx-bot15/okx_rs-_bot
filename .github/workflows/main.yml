name: Crypto RSI Bot

on:
  schedule:
    - cron: "*/20 * * * *"  # Her 20 dakikada bir otomatik çalışır
  workflow_dispatch:        # Elle çalıştırma butonu (Marşa basmak için)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Uyumlu versiyonları buraya da çiviliyoruz ki hata çıkmasın
          pip install numpy==1.23.5 pandas==1.5.3 ccxt pyTelegramBotAPI
          
      - name: Run RSI Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rsi_bot.py
