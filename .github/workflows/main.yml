name: Crypto RSI Bot

on:
  schedule:
    - cron: "*/20 * * * *"  # Her 20 dakikada bir (00, 20, 40) otomatik çalışır
  workflow_dispatch:        # "Run workflow" butonuyla elle çalıştırma desteği

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pandas ve CCXT versiyonlarını sabitledik ki kavga çıkmasın
          pip install pandas==1.5.3 ccxt python-telegram-bot
          # pandas-ta kütüphanesini direkt ana kaynağından (GitHub) çekiyoruz (Hata veren kısım burasıydı)
          pip install git+https://github.com/twopirllc/pandas-ta.git@development

      - name: Run RSI Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rsi_bot.py
