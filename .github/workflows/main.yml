name: Crypto RSI Bot

on:
  schedule:
    - cron: "*/20 * * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 3.9'dan 3.10'a çektik, kütüphane uyumu daha iyi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # En stabil sürümleri direkt pip ile kuruyoruz
          pip install pandas==1.5.3 ccxt python-telegram-bot
          pip install pandas_ta  # Alt tire ile yazınca bazen daha rahat buluyor

      - name: Run RSI Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rsi_bot.py
